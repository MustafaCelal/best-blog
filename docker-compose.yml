services:
  backend:
    build: 
      context: ./backend
    container_name: best-blog-pb
    restart: unless-stopped
    ports:
      - "8090:8080"
    volumes:
      - ./backend/pb_data:/pb/pb_data
      - ./backend/pb_migrations:/pb/pb_migrations
      - ./backend/pb_public:/pb/pb_public
    environment:
      - PB_ENCRYPTION_KEY=${PB_ENCRYPTION_KEY:-very_secret_key}
    networks:
      - blog-network

  admin-ui:
    build:
      context: ./admin-ui
    container_name: best-blog-admin
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./admin-ui:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - blog-network

  showcase:
    build:
      context: ./public-blog
    container_name: best-blog-showcase
    restart: unless-stopped
    ports:
      - "4321:4321"
    volumes:
      - ./public-blog:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - blog-network

networks:
  blog-network:
    driver: bridge
